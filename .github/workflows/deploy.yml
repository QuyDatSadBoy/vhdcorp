# ============================================================
# CI/CD — test TOÀN DIỆN trước, PASS hết mới deploy.
#   - PR vào main / push main / bấm tay → chạy job `test`.
#   - CHỈ khi `test` xanh + là push vào main → job `deploy` SSH vào VPS.
#   - test đỏ → deploy KHÔNG chạy → server giữ nguyên bản cũ.
# Secrets cần (Settings → Secrets → Actions): VPS_HOST, VPS_USER, VPS_SSH_KEY, VPS_PORT
# ============================================================
name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test toàn diện (BE + FE + Agent)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      # Prisma 7 cần DATABASE_URL để load config lúc generate/build (KHÔNG kết nối thật;
      # migrate/seed chỉ chạy trên server thật). Giá trị giả cho generate/tsc/jest/build.
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python + uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      # ---------- Backend ----------
      - name: BE · install
        working-directory: be
        run: yarn install --frozen-lockfile
      - name: BE · prisma generate
        working-directory: be
        run: yarn prisma:generate
      - name: BE · typecheck
        working-directory: be
        run: yarn tsc --noEmit
      - name: BE · unit tests (voucher, giá KM…)
        working-directory: be
        run: yarn test
      - name: BE · build
        working-directory: be
        run: yarn build

      # ---------- Frontend ----------
      - name: FE · install
        working-directory: fe
        run: yarn install --frozen-lockfile
      - name: FE · lint
        working-directory: fe
        run: yarn lint
      - name: FE · typecheck
        working-directory: fe
        run: yarn tsc --noEmit
      - name: FE · build
        working-directory: fe
        run: yarn build

      # ---------- Agent ----------
      - name: Agent · sync + pytest (57 test)
        working-directory: agent
        run: |
          uv sync --frozen
          uv run pytest -q

  deploy:
    name: Deploy lên VPS (chỉ khi test xanh)
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: SSH & deploy (có rollback nếu health fail)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 25m
          script: |
            set -e
            export PATH="$HOME/.local/bin:/usr/bin:/usr/local/bin:$PATH"
            cd $HOME/vhdcorp
            DEPLOY_BRANCH=main bash scripts/deploy.sh
