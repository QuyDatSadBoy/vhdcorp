# Kong Gateway DB-less — reverse proxy cho VHD Corp.
# Copy vào /etc/kong/kong.yml, đổi <domain> rồi: sudo systemctl restart kong
# (chi tiết: docs/DEPLOY.md §2)
_format_version: "3.0"

services:
  - name: vhd-fe
    url: http://localhost:3001
    routes:
      - name: fe
        paths: ["/"]
    plugins:
      - name: rate-limiting
        config: { minute: 300, policy: local }

  - name: vhd-be
    url: http://localhost:8080/api
    routes:
      - name: be
        paths: ["/api"]
        strip_path: true
    plugins:
      - name: rate-limiting
        config: { minute: 600, policy: local }
      - name: cors
        config:
          origins: ["https://<domain>"]
          credentials: true
          methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
          headers: ["Content-Type", "Authorization", "X-Session-Scope", "X-Requested-With"]

  - name: vhd-agent
    url: http://localhost:8001
    routes:
      - name: agent
        paths: ["/agent"]
        strip_path: true
    plugins:
      - name: rate-limiting
        config: { minute: 120, policy: local }
