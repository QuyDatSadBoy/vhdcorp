<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="pipeBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B3A8C"/>
      <stop offset="100%" stop-color="#0F2356"/>
    </linearGradient>
    <linearGradient id="pipeHl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4FB8E7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4FB8E7" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="pipeInner" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#0a1a3d"/>
      <stop offset="100%" stop-color="#1B3A8C"/>
    </radialGradient>
  </defs>

  <!-- Back row -->
  <g transform="translate(40 80)">
    <ellipse cx="55" cy="20" rx="50" ry="18" fill="url(#pipeBody)"/>
    <rect x="5" y="20" width="100" height="180" fill="url(#pipeBody)" rx="2"/>
    <ellipse cx="55" cy="200" rx="50" ry="18" fill="url(#pipeInner)"/>
    <ellipse cx="55" cy="20" rx="42" ry="14" fill="url(#pipeInner)"/>
    <rect x="12" y="30" width="6" height="160" fill="url(#pipeHl)" opacity="0.7"/>
    <ellipse cx="55" cy="35" rx="46" ry="2" fill="#4FB8E7" opacity="0.45"/>
    <ellipse cx="55" cy="45" rx="46" ry="2" fill="#4FB8E7" opacity="0.25"/>
  </g>

  <g transform="translate(150 50)">
    <ellipse cx="55" cy="20" rx="50" ry="18" fill="url(#pipeBody)"/>
    <rect x="5" y="20" width="100" height="220" fill="url(#pipeBody)" rx="2"/>
    <ellipse cx="55" cy="240" rx="50" ry="18" fill="url(#pipeInner)"/>
    <ellipse cx="55" cy="20" rx="42" ry="14" fill="url(#pipeInner)"/>
    <rect x="12" y="30" width="6" height="200" fill="url(#pipeHl)" opacity="0.7"/>
    <ellipse cx="55" cy="35" rx="46" ry="2" fill="#4FB8E7" opacity="0.45"/>
    <ellipse cx="55" cy="45" rx="46" ry="2" fill="#4FB8E7" opacity="0.25"/>
  </g>

  <!-- Front small accent -->
  <g transform="translate(80 220)">
    <ellipse cx="35" cy="15" rx="32" ry="12" fill="#F5A623"/>
    <rect x="3" y="15" width="64" height="60" fill="#F5A623" rx="2"/>
    <ellipse cx="35" cy="75" rx="32" ry="12" fill="#C8102E"/>
    <ellipse cx="35" cy="15" rx="26" ry="9" fill="#C8102E" opacity="0.85"/>
  </g>
</svg>
