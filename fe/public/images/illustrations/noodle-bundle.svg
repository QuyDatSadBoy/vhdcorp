<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="noodleA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#D88B14"/>
    </linearGradient>
    <linearGradient id="noodleB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFC85A"/>
      <stop offset="100%" stop-color="#E59A1E"/>
    </linearGradient>
    <linearGradient id="wrapBand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8102E"/>
      <stop offset="100%" stop-color="#8C0B20"/>
    </linearGradient>
  </defs>

  <!-- Bundle of noodle strands (vertical lines clustered) -->
  <g>
    <!-- Back layer -->
    <g opacity="0.55">
      <rect x="80" y="40" width="2.5" height="240" rx="1.25" fill="url(#noodleA)"/>
      <rect x="86" y="40" width="2.5" height="240" rx="1.25" fill="url(#noodleB)"/>
      <rect x="92" y="40" width="2.5" height="240" rx="1.25" fill="url(#noodleA)"/>
      <rect x="98" y="40" width="2.5" height="240" rx="1.25" fill="url(#noodleB)"/>
      <rect x="104" y="40" width="2.5" height="240" rx="1.25" fill="url(#noodleA)"/>
      <rect x="218" y="40" width="2.5" height="240" rx="1.25" fill="url(#noodleA)"/>
      <rect x="224" y="40" width="2.5" height="240" rx="1.25" fill="url(#noodleB)"/>
      <rect x="230" y="40" width="2.5" height="240" rx="1.25" fill="url(#noodleA)"/>
      <rect x="236" y="40" width="2.5" height="240" rx="1.25" fill="url(#noodleB)"/>
    </g>
    <!-- Mid layer -->
    <g opacity="0.85">
      <rect x="110" y="30" width="3" height="260" rx="1.5" fill="url(#noodleA)"/>
      <rect x="117" y="30" width="3" height="260" rx="1.5" fill="url(#noodleB)"/>
      <rect x="124" y="30" width="3" height="260" rx="1.5" fill="url(#noodleA)"/>
      <rect x="131" y="30" width="3" height="260" rx="1.5" fill="url(#noodleB)"/>
      <rect x="138" y="30" width="3" height="260" rx="1.5" fill="url(#noodleA)"/>
      <rect x="180" y="30" width="3" height="260" rx="1.5" fill="url(#noodleA)"/>
      <rect x="187" y="30" width="3" height="260" rx="1.5" fill="url(#noodleB)"/>
      <rect x="194" y="30" width="3" height="260" rx="1.5" fill="url(#noodleA)"/>
      <rect x="201" y="30" width="3" height="260" rx="1.5" fill="url(#noodleB)"/>
      <rect x="208" y="30" width="3" height="260" rx="1.5" fill="url(#noodleA)"/>
    </g>
    <!-- Front clean strands -->
    <g>
      <rect x="148" y="20" width="3.5" height="280" rx="1.75" fill="url(#noodleA)"/>
      <rect x="156" y="20" width="3.5" height="280" rx="1.75" fill="url(#noodleB)"/>
      <rect x="164" y="20" width="3.5" height="280" rx="1.75" fill="url(#noodleA)"/>
      <rect x="172" y="20" width="3.5" height="280" rx="1.75" fill="url(#noodleB)"/>
    </g>
  </g>

  <!-- Wrap band (red) — biểu tượng buộc bó miến -->
  <g>
    <rect x="60" y="148" width="200" height="36" rx="6" fill="url(#wrapBand)"/>
    <rect x="60" y="148" width="200" height="6" fill="#fff" opacity="0.18"/>
    <text x="160" y="172" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#fff" letter-spacing="2">VHD</text>
  </g>

  <!-- Sparkle accents -->
  <g opacity="0.85">
    <circle cx="50" cy="60" r="3" fill="#F5A623"/>
    <circle cx="276" cy="80" r="2.5" fill="#1B3A8C"/>
    <circle cx="280" cy="240" r="3" fill="#F5A623"/>
    <circle cx="44" cy="250" r="2.5" fill="#1B3A8C"/>
  </g>
</svg>
