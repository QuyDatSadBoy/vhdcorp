<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 720" fill="none" aria-hidden="true">
  <defs>
    <radialGradient id="hcAtm" cx="0.5" cy="0.42" r="0.7">
      <stop offset="0%" stop-color="#4FB8E7" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#1B3A8C" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#1B3A8C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pipeBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4FB8E7"/>
      <stop offset="55%" stop-color="#1B3A8C"/>
      <stop offset="100%" stop-color="#0F2356"/>
    </linearGradient>
    <linearGradient id="pipeBlueHL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7FD6FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7FD6FF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#7FD6FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pipeYellow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD37A"/>
      <stop offset="60%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#C77A0B"/>
    </linearGradient>
    <radialGradient id="rubberFill" cx="0.5" cy="0.5" r="0.6">
      <stop offset="40%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#070712"/>
    </radialGradient>
    <linearGradient id="noodleGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE08A"/>
      <stop offset="50%" stop-color="#F5B53B"/>
      <stop offset="100%" stop-color="#A86B07"/>
    </linearGradient>
    <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B3A8C" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#1B3A8C" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dotGrid" x="0" y="0" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#1B3A8C" opacity="0.10"/>
    </pattern>
  </defs>

  <!-- Atmosphere background -->
  <rect width="800" height="720" fill="url(#hcAtm)"/>
  <rect width="800" height="720" fill="url(#dotGrid)"/>

  <!-- Logo brand sweep — three concentric arcs (yellow / navy / red) -->
  <g transform="translate(420 360)" opacity="0.95">
    <circle r="252" fill="none" stroke="#F5A623" stroke-width="10" stroke-linecap="round" stroke-dasharray="320 200" opacity="0.30" transform="rotate(-30)"/>
    <circle r="226" fill="none" stroke="#1B3A8C" stroke-width="6" stroke-linecap="round" stroke-dasharray="220 180" opacity="0.25" transform="rotate(45)"/>
    <circle r="200" fill="none" stroke="#C8102E" stroke-width="5" stroke-linecap="round" stroke-dasharray="120 240" opacity="0.22" transform="rotate(120)"/>
  </g>

  <!-- Floor reflection plane -->
  <ellipse cx="420" cy="640" rx="320" ry="38" fill="url(#floorGrad)"/>

  <!-- ============================ -->
  <!-- Left cluster: PVC Pipe stack -->
  <!-- ============================ -->
  <g filter="url(#softShadow)">
    <!-- Bottom large pipe -->
    <g transform="translate(70 380)">
      <ellipse cx="65" cy="18" rx="62" ry="18" fill="url(#pipeBlue)"/>
      <rect x="3" y="18" width="124" height="220" fill="url(#pipeBlue)" rx="3"/>
      <ellipse cx="65" cy="238" rx="62" ry="18" fill="#0a1a3d"/>
      <ellipse cx="65" cy="18" rx="50" ry="14" fill="#06122b"/>
      <ellipse cx="65" cy="18" rx="38" ry="10" fill="#040c20"/>
      <!-- Glossy reflection band -->
      <rect x="14" y="28" width="9" height="200" fill="url(#pipeBlueHL)" opacity="0.55"/>
      <rect x="100" y="28" width="4" height="200" fill="#7FD6FF" opacity="0.18"/>
      <!-- Brand label -->
      <rect x="32" y="120" width="66" height="22" rx="3" fill="#F5A623"/>
      <text x="65" y="135" text-anchor="middle" font-family="'Be Vietnam Pro', system-ui, sans-serif" font-size="11" font-weight="800" fill="#1B3A8C" letter-spacing="1.6">VHD</text>
    </g>
    <!-- Middle taller pipe -->
    <g transform="translate(180 320)">
      <ellipse cx="55" cy="16" rx="52" ry="16" fill="url(#pipeBlue)"/>
      <rect x="3" y="16" width="104" height="280" fill="url(#pipeBlue)" rx="3"/>
      <ellipse cx="55" cy="296" rx="52" ry="16" fill="#0a1a3d"/>
      <ellipse cx="55" cy="16" rx="42" ry="12" fill="#06122b"/>
      <ellipse cx="55" cy="16" rx="32" ry="9" fill="#040c20"/>
      <rect x="11" y="26" width="7" height="260" fill="url(#pipeBlueHL)" opacity="0.6"/>
      <rect x="84" y="26" width="3" height="260" fill="#7FD6FF" opacity="0.18"/>
    </g>
    <!-- Small accent yellow pipe -->
    <g transform="translate(50 540)">
      <ellipse cx="36" cy="12" rx="34" ry="11" fill="url(#pipeYellow)"/>
      <rect x="2" y="12" width="68" height="64" fill="url(#pipeYellow)" rx="2"/>
      <ellipse cx="36" cy="76" rx="34" ry="11" fill="#a85c08"/>
      <ellipse cx="36" cy="12" rx="26" ry="8" fill="#a85c08" opacity="0.85"/>
      <rect x="9" y="20" width="5" height="50" fill="#FFE08A" opacity="0.5"/>
    </g>
  </g>

  <!-- ============================ -->
  <!-- Right cluster: Rubber rings  -->
  <!-- ============================ -->
  <g transform="translate(580 220)" filter="url(#softShadow)">
    <!-- Stack of three rings with depth -->
    <g transform="rotate(-14) translate(0 28)">
      <ellipse cx="0" cy="0" rx="135" ry="42" fill="url(#rubberFill)"/>
      <ellipse cx="0" cy="0" rx="64" ry="20" fill="#0a0a14"/>
      <ellipse cx="0" cy="-3" rx="115" ry="3" fill="#4FB8E7" opacity="0.45"/>
    </g>
    <g transform="rotate(-2)">
      <ellipse cx="0" cy="0" rx="128" ry="40" fill="url(#rubberFill)"/>
      <ellipse cx="0" cy="0" rx="60" ry="19" fill="#06060d"/>
      <ellipse cx="0" cy="-2" rx="106" ry="3" fill="#4FB8E7" opacity="0.5"/>
      <!-- Branded label -->
      <rect x="-30" y="-7" width="60" height="14" rx="2" fill="#F5A623"/>
      <text x="0" y="3" text-anchor="middle" font-family="'Be Vietnam Pro', system-ui, sans-serif" font-size="9" font-weight="800" fill="#1B3A8C" letter-spacing="1.4">VHD CORP</text>
    </g>
    <g transform="rotate(10) translate(0 -28)">
      <ellipse cx="0" cy="0" rx="120" ry="38" fill="#F5A623"/>
      <ellipse cx="0" cy="0" rx="58" ry="18" fill="#fff"/>
      <ellipse cx="0" cy="-2" rx="100" ry="2" fill="#fff" opacity="0.85"/>
    </g>
  </g>

  <!-- ============================ -->
  <!-- Center: Noodle bundle (Miến) -->
  <!-- ============================ -->
  <g transform="translate(360 470) rotate(-6)" filter="url(#softShadow)">
    <!-- Strands -->
    <g opacity="0.95">
      <rect x="-2" y="0" width="3" height="200" rx="1.5" fill="url(#noodleGold)"/>
      <rect x="4"  y="-2" width="3" height="204" rx="1.5" fill="url(#noodleGold)"/>
      <rect x="10" y="0" width="3" height="200" rx="1.5" fill="url(#noodleGold)"/>
      <rect x="16" y="-3" width="3" height="206" rx="1.5" fill="url(#noodleGold)"/>
      <rect x="22" y="0" width="3" height="200" rx="1.5" fill="url(#noodleGold)"/>
      <rect x="28" y="-2" width="3" height="204" rx="1.5" fill="url(#noodleGold)"/>
      <rect x="34" y="0" width="3" height="200" rx="1.5" fill="url(#noodleGold)"/>
      <rect x="40" y="-1" width="3" height="202" rx="1.5" fill="url(#noodleGold)"/>
      <rect x="46" y="0" width="3" height="200" rx="1.5" fill="url(#noodleGold)"/>
      <rect x="52" y="-2" width="3" height="204" rx="1.5" fill="url(#noodleGold)"/>
      <rect x="58" y="0" width="3" height="200" rx="1.5" fill="url(#noodleGold)"/>
      <rect x="64" y="-3" width="3" height="206" rx="1.5" fill="url(#noodleGold)"/>
      <rect x="70" y="0" width="3" height="200" rx="1.5" fill="url(#noodleGold)"/>
      <rect x="76" y="-1" width="3" height="202" rx="1.5" fill="url(#noodleGold)"/>
      <rect x="82" y="0" width="3" height="200" rx="1.5" fill="url(#noodleGold)"/>
    </g>
    <!-- Red wrap with shine -->
    <g>
      <rect x="-8" y="80" width="100" height="32" rx="4" fill="#C8102E"/>
      <rect x="-8" y="80" width="100" height="6" fill="#fff" opacity="0.30"/>
      <rect x="-8" y="106" width="100" height="3" fill="#000" opacity="0.20"/>
      <text x="42" y="100" text-anchor="middle" font-family="'Be Vietnam Pro', system-ui, sans-serif" font-size="11" font-weight="900" fill="#fff" letter-spacing="2">VHD</text>
      <text x="42" y="110" text-anchor="middle" font-family="'Be Vietnam Pro', system-ui, sans-serif" font-size="6" font-weight="700" fill="#fff" letter-spacing="1.5" opacity="0.85">MIẾN VIỆT</text>
    </g>
    <!-- Top tassel detail -->
    <path d="M0 -8 Q42 -16 84 -8" stroke="#C8102E" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.85"/>
  </g>

  <!-- ============================ -->
  <!-- Floating accent elements     -->
  <!-- ============================ -->
  <g filter="url(#glow)">
    <!-- Blueprint-like coil tube top right -->
    <path d="M 700 90 Q 760 110 740 170 Q 720 230 770 260" stroke="#4FB8E7" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.55"/>
    <circle cx="700" cy="90" r="5" fill="#4FB8E7"/>
    <circle cx="770" cy="260" r="5" fill="#4FB8E7"/>
  </g>

  <!-- Small accent floating dots -->
  <g>
    <circle cx="730" cy="120" r="6" fill="#F5A623" opacity="0.7"/>
    <circle cx="50" cy="320" r="5" fill="#4FB8E7" opacity="0.6"/>
    <circle cx="770" cy="500" r="4" fill="#C8102E" opacity="0.65"/>
    <circle cx="720" cy="600" r="5" fill="#1B3A8C" opacity="0.55"/>
    <circle cx="40" cy="100" r="3" fill="#F5A623" opacity="0.55"/>
  </g>

  <!-- Bottom-right industry tag mark -->
  <g transform="translate(640 580)" opacity="0.9">
    <rect x="0" y="0" width="120" height="30" rx="15" fill="#fff" stroke="#1B3A8C" stroke-width="1.4" opacity="0.95"/>
    <circle cx="14" cy="15" r="4" fill="#F5A623"/>
    <text x="26" y="19" font-family="'Be Vietnam Pro', system-ui, sans-serif" font-size="10" font-weight="700" fill="#1B3A8C" letter-spacing="0.4">B2B · Toàn quốc</text>
  </g>

  <!-- ISO certified badge top-left -->
  <g transform="translate(40 60)" opacity="0.92">
    <circle cx="22" cy="22" r="22" fill="#1B3A8C"/>
    <text x="22" y="20" text-anchor="middle" font-family="'Be Vietnam Pro', system-ui, sans-serif" font-size="8" font-weight="800" fill="#F5A623" letter-spacing="0.4">ISO</text>
    <text x="22" y="32" text-anchor="middle" font-family="'Be Vietnam Pro', system-ui, sans-serif" font-size="7" font-weight="700" fill="#fff">9001</text>
  </g>
</svg>
